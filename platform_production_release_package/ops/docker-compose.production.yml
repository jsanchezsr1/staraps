version: "3.9"

services:
  web-platform:
    build:
      context: ../platform
      dockerfile: ../ops/docker/web-platform.Dockerfile
    env_file:
      - ../env/.env.production
    ports:
      - "3000:3000"
    depends_on:
      - api-platform

  api-platform:
    build:
      context: ../platform
      dockerfile: ../ops/docker/api-platform.Dockerfile
    env_file:
      - ../env/.env.production
    ports:
      - "4000:4000"
    depends_on:
      - redis
      - postgres

  worker:
    build:
      context: ../platform
      dockerfile: ../ops/docker/worker.Dockerfile
    env_file:
      - ../env/.env.production
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: change-me
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

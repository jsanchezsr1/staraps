name: deploy-production

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        run: |
          docker build -f ops/docker/web-platform.Dockerfile -t ${{ secrets.ECR_WEB_IMAGE }} .
          docker build -f ops/docker/api-platform.Dockerfile -t ${{ secrets.ECR_API_IMAGE }} .
          docker build -f ops/docker/worker.Dockerfile -t ${{ secrets.ECR_WORKER_IMAGE }} .
          docker push ${{ secrets.ECR_WEB_IMAGE }}
          docker push ${{ secrets.ECR_API_IMAGE }}
          docker push ${{ secrets.ECR_WORKER_IMAGE }}

      - name: Terraform apply
        working-directory: ops/terraform/aws
        run: |
          terraform init
          terraform apply -auto-approve             -var="web_image=${{ secrets.ECR_WEB_IMAGE }}"             -var="api_image=${{ secrets.ECR_API_IMAGE }}"             -var="worker_image=${{ secrets.ECR_WORKER_IMAGE }}"             -var="certificate_arn=${{ secrets.ACM_CERTIFICATE_ARN }}"             -var="domain_name=${{ secrets.APP_DOMAIN_NAME }}"             -var="api_domain_name=${{ secrets.API_DOMAIN_NAME }}"
